<!DOCTYPE html>
<html>

<head>
    <title>Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #141e30, #243b55);
            font-family: 'Poppins', sans-serif;
        }

        /* Glassmorphism Card */
        .calculator {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.08);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Display */
        #display {
            width: 100%;
            height: 60px;
            margin-bottom: 15px;
            font-size: 24px;
            text-align: right;
            padding: 10px;
            border-radius: 12px;
            border: none;
            outline: none;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        /* Grid */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            gap: 12px;
        }

        /* Buttons */
        button {
            height: 60px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        /* Hover effect */
        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* Click effect */
        button:active {
            transform: scale(0.95);
        }

        /* Special buttons */
        button:nth-child(1) {
            background: #ff4d4d;
        }

        /* Clear */
        button:nth-child(4n) {
            background: #4da6ff;
        }

        /* Operators */

        /* Equals button */
        button:nth-child(12) {
            background: #00c853;
            color: white;
        }

        /* Zero button */
        .zero {
            grid-column: span 2;
        }

        /* Glow effect */
        button:hover {
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        </style </head><body><div class="calculator"><input type="text" id="display" disabled><div class="buttons"><button onclick="clearDisplay()">C</button><button onclick="append('/')">/</button><button onclick="append('*')">*</button><button onclick="append('-')">-</button><button onclick="append('7')">7</button><button onclick="append('8')">8</button><button onclick="append('9')">9</button><button onclick="append('+')">+</button><button onclick="append('4')">4</button><button onclick="append('5')">5</button><button onclick="append('6')">6</button><button onclick="calculate()">=</button><button onclick="append('1')">1</button><button onclick="append('2')">2</button><button onclick="append('3')">3</button><button onclick="append('0')" class="zero">0</button></div></div><script>let display = document.getElementById("display");

            function append(value) {
                display.value += value;
            }

            function clearDisplay() {
                display.value = "";
            }

            function calculate() {
                try {
                    display.value = eval(display.value);
                }

                catch {
                    display.value = "Error";
                }
            }

        </script></body></html>
